name: Release and publish
on:
  push:
    branches: [main]
    paths:
      - package.json
      - server.json

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write # required for MCP Registry OIDC authentication

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - run: corepack enable
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: yarn
          registry-url: https://registry.npmjs.org
      - name: Check for version bump
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          fi
      - name: Create tag and release
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag "${{ steps.check.outputs.tag }}"
          git push origin "${{ steps.check.outputs.tag }}"
          gh release create "${{ steps.check.outputs.tag }}" \
            --title "${{ steps.check.outputs.tag }}" \
            --generate-notes
      - name: Publish to npm
        if: steps.check.outputs.skip == 'false'
        run: |
          yarn install --immutable
          yarn build
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ─── Downstream registry publishes ───
      # Fire only after npm publish succeeds and only on real version bumps.

      - name: Install mcp-publisher
        if: steps.check.outputs.skip == 'false'
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
      - name: Authenticate to MCP Registry (OIDC)
        if: steps.check.outputs.skip == 'false'
        run: ./mcp-publisher login github-oidc
      - name: Publish to MCP Registry
        if: steps.check.outputs.skip == 'false'
        run: ./mcp-publisher publish

      - name: Publish to Smithery
        if: steps.check.outputs.skip == 'false'
        env:
          SMITHERY_TOKEN: ${{ secrets.SMITHERY_TOKEN }}
        run: |
          if [ -z "$SMITHERY_TOKEN" ]; then
            echo "SMITHERY_TOKEN not set, skipping Smithery publish."
            exit 0
          fi
          npx -y @smithery/cli mcp publish \
            https://mcp.arcadia.finance/mcp \
            -n @arcadia-finance/mcp-server

      - name: Publish ClawHub skill
        if: steps.check.outputs.skip == 'false'
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          if [ -z "$CLAWHUB_TOKEN" ]; then
            echo "CLAWHUB_TOKEN not set, skipping ClawHub publish."
            exit 0
          fi
          SKILL_VERSION=$(awk '/^version:/ { print $2; exit }' skills/openclaw/SKILL.md)
          if [ -z "$SKILL_VERSION" ]; then
            echo "Could not read version from skills/openclaw/SKILL.md frontmatter."
            exit 1
          fi
          npx -y clawhub login --token "$CLAWHUB_TOKEN" --no-input
          npx -y clawhub publish "$PWD/skills/openclaw" \
            --slug arcadia-finance \
            --name "Arcadia Finance" \
            --version "$SKILL_VERSION" \
            --no-input
