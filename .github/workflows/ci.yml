name: CI
on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: yarn
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn build
      - run: yarn lint
      - run: yarn test --exclude '**/integration.test.ts'
      - name: Verify version sync
        run: |
          VERSION=$(node -p "require('./package.json').version")
          node -e "
            const s = require('./server.json');
            const mismatches = [];
            if (s.version !== '${VERSION}') mismatches.push('server.json .version');
            const pkg = s.packages?.find(p => p.registryType === 'npm');
            if (pkg && pkg.version !== '${VERSION}') mismatches.push('server.json .packages[npm].version');
            if (mismatches.length) {
              console.error('Version mismatch: ' + mismatches.join(', ') + ' != ${VERSION}');
              process.exit(1);
            }
            console.log('All versions match ${VERSION}');
          "
